<!DOCTYPE html>
<html lang="pt-BR" data-theme="purple">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NyanTools — Sua caixa de ferramentas purr-feita にゃん~">
    <title>NyanTools にゃん~</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Estilos do app -->
    <link rel="stylesheet" href="../src/styles/main.css">
    <link rel="stylesheet" href="../src/styles/dark-theme.css">
    <link rel="stylesheet" href="../src/styles/theme-system.css">
    <link rel="stylesheet" href="../src/styles/density-fix.css">

    <style>
        /* ─── Tipografia base */
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Syne', sans-serif; }

        /* ─── Loading screen */
        #loading-screen {
            background: #0a0a0f;
        }

        .loading-logo {
            animation: loadingPulse 1.8s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { transform: scale(1);   filter: drop-shadow(0 0 20px rgba(168,85,247,0.4)); }
            50%       { transform: scale(1.08); filter: drop-shadow(0 0 40px rgba(236,72,153,0.7)); }
        }

        .loading-bar-track {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899, #a855f7);
            background-size: 200% 100%;
            border-radius: 99px;
            animation: loadingSlide 1.4s ease-in-out infinite;
        }

        @keyframes loadingSlide {
            0%   { width: 0%;    background-position: 0% 0%; }
            50%  { width: 80%;   background-position: 100% 0%; }
            100% { width: 100%;  background-position: 200% 0%; opacity: 0; }
        }

        /* ─── Login screen */
        #login-screen {
            background: #0a0a0f;
        }

        /* Grade de pontos decorativa */
        .dot-grid {
            background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Orbs de fundo */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(139,92,246,0.25); top: -10%;  left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: rgba(236,72,153,0.2);  bottom: -5%; right: -5%; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(14,165,233,0.15); top: 40%;   left: 45%;  animation-delay: -2s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0,0)    scale(1); }
            33%       { transform: translate(20px,-15px) scale(1.05); }
            66%       { transform: translate(-10px,10px) scale(0.97); }
        }

        /* Card de login */
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* Entrada do card */
        .login-card-enter {
            animation: cardEnter 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* Inputs do login */
        .login-input {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            color: white;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
        }
        .login-input::placeholder { color: rgba(255,255,255,0.35); }
        .login-input:focus {
            border-color: rgba(168,85,247,0.7);
            background: rgba(168,85,247,0.08);
            box-shadow: 0 0 0 4px rgba(168,85,247,0.12);
        }

        /* Botão de login */
        .login-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
            box-shadow: 0 4px 24px rgba(139,92,246,0.45);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }
        .login-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(139,92,246,0.6); filter: brightness(1.05); }
        .login-btn:active { transform: translateY(0);    box-shadow: 0 2px 12px rgba(139,92,246,0.3); }

        /* ─── Shake de erro */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX( 8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX( 5px); }
        }
        .animate-shake { animation: shake 0.4s ease; }

        /* ─── App principal */
        #main-app { display: none; height: 100vh; }
        #main-app.visible { display: flex; }

        #sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        }

        /* Scrollbar fina na nav */
        #nav-menu::-webkit-scrollbar       { width: 4px; }
        #nav-menu::-webkit-scrollbar-track { background: transparent; }
        #nav-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Conteúdo principal com scroll */
        #main-content::-webkit-scrollbar       { width: 6px; }
        #main-content::-webkit-scrollbar-track { background: transparent; }
        #main-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

        /* ─── Modal "O que há de novo" ───────────────────── */
        @keyframes whatsNewEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .whats-new-enter {
            animation: whatsNewEnter 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        /* ─── Badge de update no nav ─────────────────────── */
        .nav-update-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            margin-left: auto;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">

    <!-- ════════════════════════════════════════════════
         LOADING SCREEN
    ════════════════════════════════════════════════ -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="text-center text-white flex flex-col items-center gap-4">
            <!-- Logo pulsante -->
            <div class="loading-logo text-7xl select-none">🐱</div>

            <!-- Nome -->
            <div>
                <h1 class="font-display text-4xl font-black tracking-tight text-white">NyanTools</h1>
                <p class="text-white/50 text-sm mt-1 tracking-widest font-semibold uppercase">にゃん~</p>
            </div>

            <!-- Barra de progresso -->
            <div class="loading-bar-track mt-2">
                <div class="loading-bar-fill"></div>
            </div>

            <p class="text-white/30 text-xs tracking-wider">Carregando ferramentas...</p>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         LOGIN SCREEN
    ════════════════════════════════════════════════ -->
    <div id="login-screen" class="hidden fixed inset-0 flex items-center justify-center p-4 overflow-hidden">
        <!-- Grade de pontos de fundo -->
        <div class="dot-grid absolute inset-0"></div>

        <!-- Orbs de luz -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Card principal -->
        <div class="login-card login-card-enter relative w-full max-w-sm rounded-3xl p-8 z-10">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-violet-600 to-pink-600 shadow-lg shadow-violet-500/30 text-5xl mb-5 select-none">
                    🐱
                </div>
                <h1 class="font-display text-3xl font-black text-white tracking-tight">NyanTools</h1>
                <p class="text-white/40 text-sm mt-1.5">にゃん~ · Your Purr-fect Toolkit</p>
            </div>

            <!-- Formulário -->
            <form id="login-form" class="space-y-4">
                <!-- Usuário -->
                <div>
                    <label class="block text-white/60 text-xs font-semibold uppercase tracking-widest mb-2">
                        Usuário
                    </label>
                    <input type="text"
                           id="login-username"
                           class="login-input"
                           placeholder="Digite seu nome"
                           autocomplete="username"
                           required>
                </div>

                <!-- Senha -->
                <div>
                    <label class="block text-white/60 text-xs font-semibold uppercase tracking-widest mb-2">
                        Senha
                    </label>
                    <input type="password"
                           id="login-password"
                           class="login-input"
                           placeholder="Mínimo 4 caracteres"
                           autocomplete="current-password"
                           required>
                </div>

                <!-- Erro -->
                <div id="login-error" class="hidden">
                    <div class="flex items-center gap-2.5 bg-red-500/20 border border-red-500/40 text-red-300 px-4 py-3 rounded-xl text-sm animate-shake">
                        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                        <p class="font-medium"></p>
                    </div>
                </div>

                <!-- Botão -->
                <button type="submit"
                        class="login-btn w-full text-white py-4 rounded-2xl font-bold text-base tracking-wide flex items-center justify-center gap-2 mt-2">
                    <span class="font-display font-black text-lg">ENTRAR</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                    </svg>
                </button>
            </form>

            <!-- Rodapé do card -->
            <div class="mt-6 text-center">
                <div class="inline-flex items-center gap-2 text-white/20 text-xs font-semibold tracking-widest">
                    <span class="w-8 h-px bg-white/10 block"></span>
                    <span>v3.1.2</span>
                    <span class="w-8 h-px bg-white/10 block"></span>
                </div>
            </div>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         MAIN APPLICATION
    ════════════════════════════════════════════════ -->
    <div id="main-app">

        <!-- Sidebar -->
        <aside id="sidebar" class="text-white">
            <!-- Cabeçalho da sidebar -->
            <div class="p-5 border-b border-white/15">
                <h1 class="font-display text-xl font-black flex items-center gap-2 tracking-tight">
                    🐱 NyanTools
                </h1>
                <p class="text-xs text-white/50 mt-1">
                    にゃん~ Usuário: <span id="user-display" class="text-white/80 font-semibold"></span>
                </p>
            </div>

            <!-- Menu de navegação -->
            <nav id="nav-menu" class="flex-1 overflow-y-auto p-3">
                <!-- Itens inseridos pelo JavaScript -->
            </nav>

            <!-- Botão de sair -->
            <div class="p-3 border-t border-white/15">
                <button id="logout-btn"
                        class="w-full py-2.5 px-4 bg-red-500/80 hover:bg-red-500 rounded-xl transition-all text-sm font-bold flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-red-500/20">
                    <span>にゃん~ Sair</span>
                </button>
            </div>
        </aside>

        <!-- Conteúdo principal -->
        <main id="main-content" class="flex-1 overflow-y-auto p-8 bg-gray-100">
            <div id="tool-container">
                <!-- Conteúdo da ferramenta inserido pelo JavaScript -->
            </div>
        </main>
    </div>


    <!-- ═══════════════════════════════════════
         MODAL: O QUE HÁ DE NOVO
    ═══════════════════════════════════════ -->
    <div id="whats-new-modal"
         class="hidden fixed inset-0 z-[9998] flex items-end justify-center sm:items-center p-4"
         style="background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);"
         onclick="if(event.target===this) document.getElementById('whats-new-modal').classList.add('hidden')">

        <div data-whats-new-card
             class="bg-[#111827] text-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden"
             style="border: 1px solid rgba(255,255,255,0.08);">

            <!-- Topo: versão + fechar -->
            <div class="flex items-center justify-between px-6 pt-5 pb-4"
                 style="border-bottom: 1px solid rgba(255,255,255,0.07);">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg"
                         style="background: rgba(255,255,255,0.07);">🐱</div>
                    <div>
                        <div class="text-[10px] uppercase tracking-widest font-bold text-gray-500">NyanTools</div>
                        <div class="text-sm font-black leading-tight">
                            Atualizado para <span data-whats-new-version class="text-emerald-400"></span>
                        </div>
                    </div>
                </div>
                <button onclick="document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:text-white hover:bg-white/10 transition-all text-lg leading-none">
                    ✕
                </button>
            </div>

            <!-- Subtítulo -->
            <div class="px-6 pt-4 pb-2">
                <div class="text-xs text-gray-500 font-medium">
                    Novidades em relação à <span data-whats-new-from class="text-gray-400 font-bold"></span>
                </div>
            </div>

            <!-- Lista de mudanças -->
            <div data-whats-new-list
                 class="px-6 pb-4 space-y-1 max-h-72 overflow-y-auto"
                 style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;">
                <!-- Preenchido por app.js -->
            </div>

            <!-- Rodapé -->
            <div class="px-6 pb-5 pt-3 flex items-center gap-3"
                 style="border-top: 1px solid rgba(255,255,255,0.07);">
                <button onclick="document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all active:scale-95"
                        style="background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);">
                    Fechar
                </button>
                <button onclick="Router?.navigate('settings'); setTimeout(() => Settings?.switchTab?.('updates'), 100); document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all active:scale-95"
                        style="background: #10b981; color: #fff;">
                    Ver changelog completo
                </button>
            </div>
        </div>
    </div>

    <script src="../src/scripts/utils/helpers.js"></script>
    <script src="../src/scripts/core/auth.js"></script>
    <script src="../src/scripts/core/router.js"></script>
    <script src="../src/scripts/tools/password-generator/password.js"></script>
    <script src="../src/scripts/tools/weather/weather.js"></script>
    <script src="../src/scripts/tools/translator/translator.js"></script>
    <script src="../src/scripts/tools/ai-assistant/ai-chat.js"></script>
    <script src="../src/scripts/tools/mini-game/game.js"></script>
    <script src="../src/scripts/tools/temp-email/temp-email.js"></script>
    <script src="../src/scripts/tools/music-player/music.js"></script>
    <script src="../src/scripts/tools/offline-zone/termo.js"></script>
    <script src="../src/scripts/tools/offline-zone/2048.js"></script>
    <script src="../src/scripts/tools/dashboard/dashboard.js"></script>
    <script src="../src/scripts/core/keyboard-shortcuts.js"></script>
    <script src="../src/scripts/tools/offline-zone/forca.js"></script>
    <script src="../src/scripts/tools/offline-zone/offline.js"></script>
    <script src="../src/scripts/tools/offline-zone/flappy-bird.js"></script>
    <script src="../src/scripts/tools/offline-zone/tictactoe.js"></script>
    <script src="../src/scripts/tools/settings/settings.js"></script>
    <script src="../src/scripts/core/app.js"></script>
    <script src="../src/scripts/tools/updater/updater.js"></script>
    <script src="../src/scripts/tools/notes/notes.js"></script>
    <script src="../src/scripts/tools/tasks/tasks.js"></script>

</body>
</html>
