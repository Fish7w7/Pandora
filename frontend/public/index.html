<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NyanTools — Sua caixa de ferramentas purr-feita にゃん~">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* ─── Tipografia base */
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Syne', sans-serif; }

        /* ─── Loading screen */
        #loading-screen {
            background: #07070d;
        }

        /* Orbs da loading (menores, estáticos — não puxam CPU) */
        .loading-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
        }
        .loading-orb-1 { width: 500px; height: 500px; background: rgba(109,40,217,0.18); top: -15%; left: -12%; }
        .loading-orb-2 { width: 420px; height: 420px; background: rgba(131,24,67,0.14);  bottom: -10%; right: -8%; }

        /* Logo */
        .loading-logo {
            font-size: 5rem;
            line-height: 1;
            animation: loadingLogoIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                       loadingLogoPulse 2.2s ease-in-out 0.8s infinite;
            filter: drop-shadow(0 0 24px rgba(168,85,247,0.5));
        }

        @keyframes loadingLogoIn {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes loadingLogoPulse {
            0%, 100% { filter: drop-shadow(0 0 18px rgba(168,85,247,0.45)); transform: scale(1); }
            50%       { filter: drop-shadow(0 0 36px rgba(236,72,153,0.65)); transform: scale(1.06); }
        }

        /* Título */
        .loading-title {
            animation: loadingFadeUp 0.6s ease 0.25s both;
        }

        /* Subtítulo */
        .loading-sub {
            animation: loadingFadeUp 0.6s ease 0.4s both;
        }

        @keyframes loadingFadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Barra de progresso */
        .loading-bar-wrap {
            animation: loadingFadeUp 0.6s ease 0.55s both;
        }

        .loading-bar-track {
            width: 220px;
            height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #7c3aed, #a855f7, #ec4899, #a855f7, #7c3aed);
            background-size: 300% 100%;
            animation: loadingBarSlide 1.6s ease-in-out infinite;
        }

        @keyframes loadingBarSlide {
            0%   { width: 0%;   background-position: 0% 0%;   }
            45%  { width: 75%;  background-position: 60% 0%;  }
            55%  { width: 85%;  background-position: 80% 0%;  }
            100% { width: 100%; background-position: 100% 0%; opacity: 0; }
        }

        /* Texto de status */
        .loading-status {
            animation: loadingFadeUp 0.6s ease 0.65s both;
        }

        /* ─── Login screen */
        #login-screen {
            background: #0a0a0f;
        }

        /* Orbs de fundo — estáticos, sem animação (software renderer) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(139,92,246,0.22); top: -10%;  left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: rgba(236,72,153,0.18); bottom: -5%; right: -5%; }
        .orb-3 { width: 200px; height: 200px; background: rgba(14,165,233,0.12); top: 40%;   left: 45%; }

        /* Card de login */
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* Entrada do card */
        .login-card-enter {
            animation: cardEnter 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* Inputs do login */
        .login-input {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            color: white;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
        }
        .login-input::placeholder { color: rgba(255,255,255,0.35); }
        .login-input:focus {
            border-color: rgba(168,85,247,0.7);
            background: rgba(168,85,247,0.08);
            box-shadow: 0 0 0 4px rgba(168,85,247,0.12);
        }

        /* Botão de login */
        .login-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
            box-shadow: 0 4px 24px rgba(139,92,246,0.45);
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
        }
        .login-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(139,92,246,0.6); filter: brightness(1.05); }
        .login-btn:active { transform: translateY(0);    box-shadow: 0 2px 12px rgba(139,92,246,0.3); }

        /* ─── Shake de erro */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX( 8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX( 5px); }
        }
        .animate-shake { animation: shake 0.4s ease; }

        /* ─── App principal */
        #main-app { display: none; height: 100vh; }
        #main-app.visible { display: flex; }

        #sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        }

        /* Scrollbar fina na nav */
        #nav-menu::-webkit-scrollbar       { width: 4px; }
        #nav-menu::-webkit-scrollbar-track { background: transparent; }
        #nav-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Conteúdo principal com scroll */
        #main-content::-webkit-scrollbar       { width: 6px; }
        #main-content::-webkit-scrollbar-track { background: transparent; }
        #main-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

        /* ─── Modal "O que há de novo" ───────────────────── */
        @keyframes whatsNewEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .whats-new-enter {
            animation: whatsNewEnter 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        /* ─── Badge de update no nav ─────────────────────── */
        .nav-update-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            margin-left: auto;
            animation: pulse 2s infinite;
        }
    </style>
</head>

    <!-- ════════════════════════════════════════════════
         LOADING SCREEN
    ════════════════════════════════════════════════ -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center z-50">

        <!-- Orbs estáticos de fundo -->
        <div class="loading-orb loading-orb-1"></div>
        <div class="loading-orb loading-orb-2"></div>

        <!-- Conteúdo central -->
        <div class="flex flex-col items-center" style="gap: 1.25rem;">

            <!-- Logo animado -->
            <div class="loading-logo select-none">🐱</div>

            <!-- Nome + subtítulo -->
            <div class="text-center" style="margin-top: -0.25rem;">
                <h1 class="loading-title font-display font-black text-white"
                    style="font-size: 2.75rem; letter-spacing: -0.03em; line-height: 1;">
                    NyanTools
                </h1>
                <p class="loading-sub"
                   style="font-size: 0.7rem; letter-spacing: 0.28em; color: rgba(255,255,255,0.35); font-weight: 600; text-transform: uppercase; margin-top: 0.5rem;">
                    にゃん~
                </p>
            </div>

            <!-- Barra de progresso -->
            <div class="loading-bar-wrap" style="margin-top: 0.25rem;">
                <div class="loading-bar-track">
                    <div class="loading-bar-fill"></div>
                </div>
            </div>

            <!-- Status -->
            <p class="loading-status"
               style="font-size: 0.7rem; color: rgba(255,255,255,0.22); letter-spacing: 0.12em; margin-top: -0.375rem;">
                Carregando ferramentas...
            </p>

        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         LOGIN SCREEN
    ════════════════════════════════════════════════ -->
    <div id="login-screen" class="hidden fixed inset-0 flex items-center justify-center p-4 overflow-hidden">

        <!-- Orbs de luz -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Card principal -->
        <div class="login-card login-card-enter relative w-full max-w-sm rounded-3xl p-8 z-10">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-violet-600 to-pink-600 shadow-lg shadow-violet-500/30 text-5xl mb-5 select-none">
                    🐱
                </div>
                <h1 class="font-display text-3xl font-black text-white tracking-tight">NyanTools</h1>
                <p class="text-white/40 text-sm mt-1.5">にゃん~ · Your Purr-fect Toolkit</p>
            </div>

            <!-- Formulário -->
            <form id="login-form" class="space-y-4">
                <!-- Usuário -->
                <div>
                    <label class="block text-white/60 text-xs font-semibold uppercase tracking-widest mb-2">
                        Usuário
                    </label>
                    <input type="text"
                           id="login-username"
                           class="login-input"
                           placeholder="Digite seu nome"
                           autocomplete="username"
                           required>
                </div>

                <!-- Senha -->
                <div>
                    <label class="block text-white/60 text-xs font-semibold uppercase tracking-widest mb-2">
                        Senha
                    </label>
                    <input type="password"
                           id="login-password"
                           class="login-input"
                           placeholder="Mínimo 4 caracteres"
                           autocomplete="current-password"
                           required>
                </div>

                <!-- Erro -->
                <div id="login-error" class="hidden">
                    <div class="flex items-center gap-2.5 bg-red-500/20 border border-red-500/40 text-red-300 px-4 py-3 rounded-xl text-sm animate-shake">
                        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                        <p class="font-medium"></p>
                    </div>
                </div>

                <!-- Botão -->
                <button type="submit"
                        class="login-btn w-full text-white py-4 rounded-2xl font-bold text-base tracking-wide flex items-center justify-center gap-2 mt-2">
                    <span class="font-display font-black text-lg">ENTRAR</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                    </svg>
                </button>
            </form>

            <!-- Rodapé do card -->
            <div class="mt-6 text-center">
                <div class="inline-flex items-center gap-2 text-white/20 text-xs font-semibold tracking-widest">
                    <span class="w-8 h-px bg-white/10 block"></span>
                    <span>v3.7.1</span>
                    <span class="w-8 h-px bg-white/10 block"></span>
                </div>
            </div>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         MAIN APPLICATION
    ════════════════════════════════════════════════ -->
    <div id="main-app">

        <!-- Sidebar -->
        <aside id="sidebar" class="text-white">
            <!-- Cabeçalho da sidebar -->
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span class="sidebar-logo-icon">🐱</span>
                    <div>
                        <div class="sidebar-logo-name">NyanTools</div>
                        <div class="sidebar-logo-sub">にゃん~</div>
                    </div>
                </div>
                <div class="sidebar-user" id="sidebar-user-btn" onclick="Router.navigate('profile')" title="Ver perfil" style="cursor:pointer;">
                    <div class="sidebar-user-avatar" id="user-avatar">?</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="user-display">Usuário</div>
                        <div class="sidebar-user-status">
                            <span class="sidebar-user-dot"></span>
                            <span>Online</span>
                        </div>
                    </div>
                    <svg class="sidebar-user-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
            </div>

            <!-- Menu de navegação -->
            <nav id="nav-menu" class="flex-1 overflow-y-auto sidebar-nav">
                <!-- Itens inseridos pelo JavaScript -->
            </nav>

            <!-- Botão de sair -->
            <div class="sidebar-footer">
                <button id="logout-btn" class="sidebar-logout-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Sair da conta</span>
                </button>
            </div>
        </aside>

        <!-- Conteúdo principal -->
        <main id="main-content" class="flex-1 overflow-y-auto p-8 bg-gray-100">
            <div id="tool-container">
            </div>
        </main>
    </div>


    <!-- ═══════════════════════════════════════
         MODAL: O QUE HÁ DE NOVO
    ═══════════════════════════════════════ -->
    <div id="whats-new-modal"
         class="hidden fixed inset-0 z-[9998] flex items-end justify-center sm:items-center p-4"
         style="background: rgba(0,0,0,0.82);"
         onclick="if(event.target===this) document.getElementById('whats-new-modal').classList.add('hidden')">

        <div data-whats-new-card
             class="bg-[#111827] text-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden"
             style="border: 1px solid rgba(255,255,255,0.08);">

            <!-- Topo: versão + fechar -->
            <div class="flex items-center justify-between px-6 pt-5 pb-4"
                 style="border-bottom: 1px solid rgba(255,255,255,0.07);">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg"
                         style="background: rgba(255,255,255,0.07);">🐱</div>
                    <div>
                        <div class="text-[10px] uppercase tracking-widest font-bold text-gray-500">NyanTools</div>
                        <div class="text-sm font-black leading-tight">
                            Atualizado para <span data-whats-new-version class="text-emerald-400"></span>
                        </div>
                    </div>
                </div>
                <button onclick="document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:text-white hover:bg-white/10 text-lg leading-none">
                    ✕
                </button>
            </div>

            <!-- Subtítulo -->
            <div class="px-6 pt-4 pb-2">
                <div class="text-xs text-gray-500 font-medium">
                    Novidades em relação à <span data-whats-new-from class="text-gray-400 font-bold"></span>
                </div>
            </div>

            <!-- Lista de mudanças -->
            <div data-whats-new-list
                 class="px-6 pb-4 space-y-1 max-h-72 overflow-y-auto"
                 style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;">
                <!-- Preenchido por app.js -->
            </div>

            <!-- Rodapé -->
            <div class="px-6 pb-5 pt-3 flex items-center gap-3"
                 style="border-top: 1px solid rgba(255,255,255,0.07);">
                <button onclick="document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="flex-1 py-2.5 rounded-xl font-bold text-sm active:scale-95"
                        style="background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);">
                    Fechar
                </button>
                <button onclick="Router?.navigate('settings'); setTimeout(() => Settings?.switchTab?.('updates'), 100); document.getElementById('whats-new-modal').classList.add('hidden')"
                        class="flex-1 py-2.5 rounded-xl font-bold text-sm active:scale-95"
                        style="background: #10b981; color: #fff;">
                    Ver changelog completo
                </button>
            </div>
        </div>
    </div>
